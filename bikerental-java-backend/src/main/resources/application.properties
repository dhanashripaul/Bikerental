# Spring Boot Application Configuration
spring.application.name=bike-rental-api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/bikerental?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-min-32-chars!
jwt.expiration=86400000

# Logging Configuration
logging.level.root=INFO
logging.level.com.bikerental=DEBUG
logging.level.org.springframework.security=DEBUG

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080
